    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will

    -->
    <title>Mobile Emissions Testing in Utah County | Emissions on the Move</title>

    <!-- Structured data: tells Google this is a local service-area business -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "AutoRepair",
        "name": "Emissions on the Move",
        "description": "Mobile vehicle emissions testing serving all of Utah County, Utah. We come to your home or work.",
        "url": "https://www.emissionsonthemove.com/",
        "telephone": "+1-385-392-6701",
        "email": "andersonemissions@gmail.com",
        "image": "https://www.emissionsonthemove.com/eotm_with_car_and_employees.jpeg",
        "logo": "https://www.emissionsonthemove.com/logo.png",
        "priceRange": "$$",
        "areaServed": {
          "@type": "AdministrativeArea",
          "name": "Utah County, Utah"
        },
        "address": {
          "@type": "PostalAddress",
          "addressRegion": "UT",
          "addressCountry": "US"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 40.2338,
          "longitude": -111.6585
        },
        "sameAs": [
          "https://instagram.com/emissionsonthemove",
          "https://www.facebook.com/profile.php?id=61590274666347"
        ],
        "makesOffer": {
          "@type": "Offer",
          "name": "Mobile emissions test",
          "priceCurrency": "USD",
          "price": "60"
        }
      }
    </script>
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap"
